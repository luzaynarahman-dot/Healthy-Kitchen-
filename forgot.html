<!DOCTYPE html>

<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <title>Forgot Password</title>
</head>
<body>
   <div class="wrapper">
        <form action="">
          <h1>Reset Password</h1>
          <p style="text-align: center; font-size: 14px; margin-bottom: 20px;">Enter your email to receive a reset link.</p>
          
          <div class="input-box">
            <input type="email" placeholder="Enter your email" required>
            <i class="fas fa-envelope"></i>
          </div> 
        
          <button type="button" class="btn" onClick="resetPass()">Send Link</button>
        
          <div class="register">
            <p>Remember password? <a href="login.html">Login</a></p>
          </div>
        </form>
   </div>
   
   <script src="js/script.js"></script>
</body>
</html>
